name: Windows-CI
permissions:
  contents: read
  pull-requests: read

# Controls when the action will run.
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            triplet: x64-win10
            build-type: Debug
            preset-name: VS2022Win64-pie-enabled-debug
            python-version: 3.12.10
          - os: windows-2025
            triplet: x64-win10
            build-type: RelWithDebInfo
            preset-name: VS2022Win64-pie-disabled-RelWithDebInfo
            python-version: 3.13.13
          - os: windows-2025-vs2026
            triplet: x64-win10
            build-type: Release
            preset-name: VS2026Win64-pie-enabled-release
            python-version: 3.14.4

    env:
      # Indicates the location of vcpkg
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_ASSET_SOURCES: ${{ github.workspace }}\vcpkgAssets
      X_VCPKG_ASSET_SOURCES: clear;x-azurl,file:///${{ github.workspace }}\vcpkgAssets,,readwrite
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkgBin,readwrite
      VCPKG_BUILD_TREES: ${{ github.workspace }}\vcpkgBuild
      VCPKG_INSTALL_OPTIONS: "--x-buildtrees-root=${{ github.workspace }}\\vcpkgBuild"
      VCPKG_OVERLAY_PORTS: ${{ github.workspace }}\custom-triplets
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.triplet }}
      PYTHONHOME: ""
      PYTHONPATH: ""

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          submodules: false

      - name: Restore vcpkg cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}\vcpkgAssets
            ${{ github.workspace }}\vcpkgBCache
            ${{ github.workspace }}\vcpkgBin
            ${{ github.workspace }}\vcpkgBuild
          key: vcpkgCache-${{ github.repository_owner }}-${{ matrix.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}

      - name: Create directories on cache miss
        run: |
          mkdir -p ${{ github.workspace }}\vcpkgAssets
          mkdir -p ${{ github.workspace }}\vcpkgBCache
          mkdir -p ${{ github.workspace }}\vcpkgBin
          mkdir -p ${{ github.workspace }}\vcpkgBuild
        if: steps.cache-vcpkg-restore.outputs.cache-hit != 'true'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: poc-py-setup
        with:
          python-version: ${{ matrix.python-version }}
          update-environment: false

      - name: Install CMake
        uses: lukka/get-cmake@7bfc9baacbbdcb5e37957ad05c3546b3e222be3c # v4.3.2

      - name: Install vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          binaryCachePath: "${{ github.workspace }}/vcpkgBCache"
        env:
          Python3_ROOT_DIR: ${{ steps.poc-py-setup.outputs.python-path }}
          Python_ROOT_DIR: ${{ steps.poc-py-setup.outputs.python-path }}
          pythonLocation: ${{ steps.poc-py-setup.outputs.python-path }}

      - name: Build the code
        run: |
          & "${{ github.workspace }}\\script\\build.ps1" -PresetName "${{ matrix.preset-name }}"
        shell: pwsh
        env:
          Python3_ROOT_DIR: ${{ steps.vega-py-setup.outputs.python-path }}
          Python_ROOT_DIR: ${{ steps.vega-py-setup.outputs.python-path }}
          pythonLocation: ${{ steps.vega-py-setup.outputs.python-path }}

      - name: Test the code
        run: |
          & "${{ github.workspace }}\\script\\test.ps1" -PresetName "${{ matrix.preset-name }}" -BuildType "${{ matrix.build-type }}"
        shell: pwsh
        env:
          Python3_ROOT_DIR: ${{ steps.vega-py-setup.outputs.python-path }}
          Python_ROOT_DIR: ${{ steps.vega-py-setup.outputs.python-path }}
          pythonLocation: ${{ steps.vega-py-setup.outputs.python-path }}
          PYTHONUNBUFFERED: 1

      - name: Save vcpkg cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}\vcpkgAssets
            ${{ github.workspace }}\vcpkgBCache
            ${{ github.workspace }}\vcpkgBin
            ${{ github.workspace }}\vcpkgBuild
          key: ${{ steps.cache-vcpkg-restore.outputs.cache-primary-key }}
        if: steps.cache-vcpkg-restore.outputs.cache-hit != 'true'
